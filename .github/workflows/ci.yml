name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: E2E tests (Vercel preview)
        if: env.E2E_BASE_URL != ''
        run: npx playwright install --with-deps chromium && npm run test:e2e
        env:
          E2E_BASE_URL: ${{ secrets.VERCEL_PREVIEW_URL }}
