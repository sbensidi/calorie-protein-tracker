<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Toggle FAB — Sketch</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --bg-card:  #1a1d27;
      --bg-card2: #20232f;
      --border:   rgba(255,255,255,0.08);
      --border-hi:rgba(255,255,255,0.13);
      --text:     #f0f2f8;
      --text-2:   #9da3b8;
      --text-3:   #555d7a;
      --blue:     #3b82f6;
      --blue-hi:  #93c5fd;
      --indigo:   #6366f1;
      --indigo-hi:#a5b4fc;
      --green:    #10b981;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 64px;
      padding: 48px 24px;
    }

    .icon {
      font-family: 'Material Symbols Rounded';
      font-weight: 400;
      font-style: normal;
      font-size: 22px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      font-feature-settings: 'liga';
      -webkit-font-feature-settings: 'liga';
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      user-select: none;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 20px;
      text-align: center;
    }

    /* ── The toggle FAB ─────────────────────────────────────────── */
    .toggle-fab {
      position: relative;
      display: flex;
      align-items: center;
      background: var(--bg-card2);
      border: 1px solid var(--border-hi);
      border-radius: 999px;
      padding: 6px;
      gap: 2px;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.5),
        0 2px 8px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.06);
      cursor: pointer;
      user-select: none;
    }

    /* Sliding active pill */
    .toggle-fab::before {
      content: '';
      position: absolute;
      top: 6px;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      transition: left 0.25s cubic-bezier(.34,1.56,.64,1),
                  right 0.25s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
    }

    /* Calendar active (right side in RTL = first visually) */
    .toggle-fab.cal::before {
      background: rgba(99,102,241,0.2);
      border: 1px solid rgba(99,102,241,0.4);
      right: 6px;
      box-shadow: 0 0 12px rgba(99,102,241,0.25);
    }

    /* List active */
    .toggle-fab.list::before {
      background: rgba(99,102,241,0.2);
      border: 1px solid rgba(99,102,241,0.4);
      left: 6px;
      box-shadow: 0 0 12px rgba(99,102,241,0.25);
    }

    .fab-icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      cursor: pointer;
      position: relative;
      z-index: 1;
      transition: color 0.2s;
    }

    .toggle-fab.cal .fab-icon-btn.cal-btn { color: var(--indigo-hi); }
    .toggle-fab.cal .fab-icon-btn.list-btn { color: var(--text-3); }
    .toggle-fab.list .fab-icon-btn.list-btn { color: var(--indigo-hi); }
    .toggle-fab.list .fab-icon-btn.cal-btn  { color: var(--text-3); }

    /* ── Context mockup ─────────────────────────────────────────── */
    .phone {
      width: 320px;
      height: 560px;
      background: var(--bg);
      border-radius: 40px;
      border: 1.5px solid var(--border-hi);
      position: relative;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }

    .phone-header {
      height: 52px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .phone-content {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .mock-card {
      height: 72px;
      background: var(--bg-card);
      border-radius: 14px;
      border: 1px solid var(--border);
    }

    .mock-card.tall { height: 100px; }

    .fab-position {
      position: absolute;
      bottom: 24px;
      left: 20px; /* RTL: inline-end */
    }

    /* Smaller size for phone context */
    .fab-sm {
      padding: 5px;
    }
    .fab-sm .fab-icon-btn {
      width: 38px;
      height: 38px;
    }
    .fab-sm .icon {
      font-size: 20px;
    }
    .fab-sm::before {
      width: 38px;
      height: 38px;
      top: 5px;
    }
    .fab-sm.cal::before { right: 5px; }
    .fab-sm.list::before { left: 5px; }

    /* ── Size variants ─────────────────────────────────────────── */
    .variants {
      display: flex;
      gap: 24px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .variant-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .variant-label {
      font-size: 10px;
      color: var(--text-3);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- States -->
  <div>
    <p class="label">מצבים — States</p>
    <div class="variants">
      <div class="variant-group">
        <div class="variant-label">לוח שנה פעיל</div>
        <div class="toggle-fab cal">
          <button class="fab-icon-btn list-btn">
            <span class="icon">format_list_bulleted</span>
          </button>
          <button class="fab-icon-btn cal-btn">
            <span class="icon">calendar_month</span>
          </button>
        </div>
      </div>

      <div class="variant-group">
        <div class="variant-label">רשימה פעילה</div>
        <div class="toggle-fab list">
          <button class="fab-icon-btn list-btn">
            <span class="icon">format_list_bulleted</span>
          </button>
          <button class="fab-icon-btn cal-btn">
            <span class="icon">calendar_month</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- In phone context -->
  <div>
    <p class="label">בהקשר של היישום</p>
    <div style="display:flex; gap:32px; flex-wrap:wrap; justify-content:center;">

      <!-- Calendar view -->
      <div class="variant-group">
        <div class="variant-label">תצוגת לוח שנה</div>
        <div class="phone">
          <div class="phone-header">
            <span style="font-size:13px; font-weight:800; color:var(--text)">היסטוריה</span>
            <div style="width:28px;height:28px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border)"></div>
          </div>
          <div class="phone-content">
            <div class="mock-card" style="height:200px; background:var(--bg-card);">
              <!-- calendar grid hint -->
              <div style="padding:12px; display:grid; grid-template-columns:repeat(7,1fr); gap:4px;">
                <div style="font-size:8px;color:var(--text-3);text-align:center">א</div>
                <div style="font-size:8px;color:var(--text-3);text-align:center">ב</div>
                <div style="font-size:8px;color:var(--text-3);text-align:center">ג</div>
                <div style="font-size:8px;color:var(--text-3);text-align:center">ד</div>
                <div style="font-size:8px;color:var(--text-3);text-align:center">ה</div>
                <div style="font-size:8px;color:var(--text-3);text-align:center">ו</div>
                <div style="font-size:8px;color:var(--text-3);text-align:center">ש</div>
                <div></div>
                <div></div>
                <div style="width:100%;aspect-ratio:1;border-radius:6px;background:rgba(99,102,241,0.2);border:1px solid rgba(99,102,241,0.4)"></div>
                <div style="width:100%;aspect-ratio:1;border-radius:6px;background:var(--bg-card2)"></div>
                <div style="width:100%;aspect-ratio:1;border-radius:6px;background:rgba(16,185,129,0.15)"></div>
                <div style="width:100%;aspect-ratio:1;border-radius:6px;background:var(--bg-card2)"></div>
                <div style="width:100%;aspect-ratio:1;border-radius:6px;background:rgba(245,158,11,0.15)"></div>
                <div style="width:100%;aspect-ratio:1;border-radius:6px;background:var(--bg-card2)"></div>
                <div style="width:100%;aspect-ratio:1;border-radius:6px;background:rgba(16,185,129,0.15)"></div>
                <div style="width:100%;aspect-ratio:1;border-radius:6px;background:rgba(16,185,129,0.15)"></div>
                <div style="width:100%;aspect-ratio:1;border-radius:6px;background:var(--bg-card2)"></div>
                <div style="width:100%;aspect-ratio:1;border-radius:6px;background:rgba(244,63,94,0.15)"></div>
                <div style="width:100%;aspect-ratio:1;border-radius:6px;background:var(--bg-card2)"></div>
              </div>
            </div>
            <div class="mock-card"></div>
          </div>
          <div class="fab-position">
            <div class="toggle-fab fab-sm cal">
              <button class="fab-icon-btn list-btn">
                <span class="icon" style="font-size:20px">format_list_bulleted</span>
              </button>
              <button class="fab-icon-btn cal-btn">
                <span class="icon" style="font-size:20px">calendar_month</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- List view -->
      <div class="variant-group">
        <div class="variant-label">תצוגת רשימה</div>
        <div class="phone">
          <div class="phone-header">
            <span style="font-size:13px; font-weight:800; color:var(--text)">היסטוריה</span>
            <div style="width:28px;height:28px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border)"></div>
          </div>
          <div class="phone-content">
            <div style="display:flex;gap:6px;margin-bottom:4px;">
              <div style="height:34px;flex:1;border-radius:10px;background:var(--bg-card);border:1px solid var(--border)"></div>
              <div style="height:34px;flex:1;border-radius:10px;background:var(--bg-card);border:1px solid var(--border)"></div>
              <div style="height:34px;flex:1;border-radius:10px;background:var(--bg-card);border:1px solid var(--border)"></div>
            </div>
            <div class="mock-card tall"></div>
            <div class="mock-card"></div>
            <div class="mock-card tall"></div>
          </div>
          <div class="fab-position">
            <div class="toggle-fab fab-sm list">
              <button class="fab-icon-btn list-btn">
                <span class="icon" style="font-size:20px">format_list_bulleted</span>
              </button>
              <button class="fab-icon-btn cal-btn">
                <span class="icon" style="font-size:20px">calendar_month</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Interactive demo -->
  <div>
    <p class="label">אינטרקטיבי — לחץ להחלפה</p>
    <div class="toggle-fab cal" id="demo" style="cursor:pointer;">
      <button class="fab-icon-btn list-btn" id="list-btn">
        <span class="icon">format_list_bulleted</span>
      </button>
      <button class="fab-icon-btn cal-btn" id="cal-btn">
        <span class="icon">calendar_month</span>
      </button>
    </div>
  </div>

  <script>
    const demo = document.getElementById('demo')
    document.getElementById('list-btn').addEventListener('click', () => {
      demo.classList.remove('cal'); demo.classList.add('list')
    })
    document.getElementById('cal-btn').addEventListener('click', () => {
      demo.classList.remove('list'); demo.classList.add('cal')
    })
  </script>
</body>
</html>
